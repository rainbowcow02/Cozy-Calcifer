<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Calcifer</title>
  <style>
    :root {
      --navy:        #1B2461;
      --periwinkle:  #7B8FD6;
      --soft-peri:   #9AA5D8;
      --peach:       #F4A896;
      --pale-yellow: #F5D878;
      --gold-yellow: #F0C040;
      --lav-gray:    #C4C8DC;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background-color: #FAFBFF;
      background-image:
        linear-gradient(rgba(155, 165, 216, 0.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155, 165, 216, 0.28) 1px, transparent 1px);
      background-size: 32px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Scene ─────────────────────────────────────────── */
    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* ── Flower ─────────────────────────────────────────── */
    #flower-wrapper {
      position: absolute;
      /* 535×520 at 60% scale → 321×312 */
      left: calc(50% - 240px);
      top: 50%;
      transform: translateY(-50%);
      width: 321px;
      height: 312px;
      isolation: isolate;
    }

    #flower-inner {
      position: relative;
      width: 535px;
      height: 520px;
      transform: scale(0.6);
      transform-origin: top left;
    }

    #flower-inner img {
      position: absolute;
      display: block;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    #controls {
      position: absolute;
      right: 9%;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .spark-btn {
      position: relative;
      width: 74px;
      height: 74px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: transform 0.13s cubic-bezier(.34,1.56,.64,1);
      outline: none;
    }
    .spark-btn:hover  { transform: scale(1.10) rotate(-3deg); }
    .spark-btn:active { transform: scale(0.93) rotate(2deg); }

    .spark-btn .btn-box {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }
    .spark-btn .btn-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44%;
      height: 44%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    /* ── Particles ───────────────────────────────────────── */
    #particle-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .particle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
<div id="scene">

  <!-- ── Flower character (11 layers) ──────────────────── -->
  <div id="flower-wrapper">
    <div id="flower-inner">

      <!-- ── flower petals (bottom group) ── -->

      <img src="assets/Cozy_Vibe-bodyscalop 1 [Vectorized].svg"
           style="left:14.5px;top:0;width:506px;height:520px;opacity:0.29;" alt="">

      <img src="assets/Cozy_Vibe-bodyhighlight 1 [Vectorized].svg"
           style="left:66px;top:61.5px;width:403px;height:397px;mix-blend-mode:screen;opacity:0.55;filter:saturate(0) brightness(1.5);" alt="">

      <img src="assets/Cozy_Vibe-bodydimension 1 [Vectorized].svg"
           style="left:22px;top:17.5px;width:491px;height:485px;opacity:0.26;" alt="">

      <img src="assets/Cozy_Vibe-outline 1 [Vectorized].svg"
           style="left:0;top:0;width:535px;height:520px;opacity:0.61;" alt="">

      <!-- ── body group — clipped to bodybase shape ── -->
      <div id="body-group" style="
        position: absolute;
        left: 96.5px; top: 97px; width: 342px; height: 326px;
        isolation: isolate;
        -webkit-mask-image: url('assets/Cozy_Vibe-bodybase 1 [Vectorized].svg');
        mask-image:         url('assets/Cozy_Vibe-bodybase 1 [Vectorized].svg');
        -webkit-mask-size: 100% 100%; mask-size: 100% 100%;
        -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
      ">
        <!-- all positions below are relative to bodybase top-left (96.5, 97) -->
        <img src="assets/Cozy_Vibe-bodybase 1 [Vectorized].svg"
             style="left:0;top:0;width:342px;height:326px;" alt="">

        <img id="layer-shadow-colorburn" src="assets/Cozy_Vibe-shadow-colorburn 1 [Vectorized].svg"
             style="left:11px;top:106px;width:281px;height:215px;mix-blend-mode:color-burn;" alt="">

        <img id="layer-shadow-shadow" src="assets/Cozy_Vibe-shadow-shadow 1 [Vectorized].svg"
             style="left:0;top:71px;width:224px;height:255px;mix-blend-mode:darken;" alt="">

        <img id="layer-boldaccent" src="assets/Cozy_Vibe-boldaccent-multiply 1 [Vectorized].svg"
             style="left:58px;top:50px;width:281px;height:246px;mix-blend-mode:multiply;" alt="">

        <img id="layer-highlight-overlay" src="assets/Cozy_Vibe-highlight-overlay 1 [Vectorized].svg"
             style="left:171px;top:35px;width:171px;height:149px;mix-blend-mode:overlay;opacity:0.85;" alt="">

        <img id="layer-highlight-screen" src="assets/Cozy_Vibe-highlight-screen 1 [Vectorized].svg"
             style="left:158px;top:22px;width:167px;height:121px;mix-blend-mode:screen;opacity:0.9;" alt="">
      </div>

      <!-- ── face (top) ── -->

      <img id="flower-face" src="assets/Cozy_Vibe-face 1 [Vectorized].svg"
           style="left:130px;top:169px;width:275px;height:182px;" alt="">

    </div>
  </div>

  <!-- ── Buttons ────────────────────────────────────────── -->
  <div id="controls">

    <button class="spark-btn" data-type="heart">
      <img class="btn-box"  src="assets/Cozy_Vibe-box 1 [Vectorized].svg"   alt="">
      <img class="btn-icon" src="assets/Cozy_Vibe-heart 1 [Vectorized].svg" alt="heart">
    </button>

    <button class="spark-btn" data-type="star1">
      <img class="btn-box"  src="assets/Cozy_Vibe-box 1 [Vectorized].svg"   alt="">
      <img class="btn-icon" src="assets/Cozy_Vibe-star1 1 [Vectorized].svg" alt="sparkle">
    </button>

    <button class="spark-btn" data-type="star2">
      <img class="btn-box"  src="assets/Cozy_Vibe-box 1 [Vectorized].svg"   alt="">
      <img class="btn-icon" src="assets/Cozy_Vibe-star2 1 [Vectorized].svg" alt="star">
    </button>

    <button class="spark-btn" data-type="swirl">
      <img class="btn-box"  src="assets/Cozy_Vibe-box 1 [Vectorized].svg"   alt="">
      <img class="btn-icon" src="assets/Cozy_Vibe-swirl 1 [Vectorized].svg" alt="swirl">
    </button>

    <button class="spark-btn" data-type="crits">
      <img class="btn-box"  src="assets/Cozy_Vibe-box 1 [Vectorized].svg"   alt="">
      <img class="btn-icon" src="assets/Cozy_Vibe-crits 1 [Vectorized].svg" alt="crits">
    </button>

  </div>

  <!-- ── Particle layer ────────────────────────────────── -->
  <div id="particle-overlay"></div>

</div>

<script>
  const overlay   = document.getElementById('particle-overlay');
  const faceEl    = document.getElementById('flower-face');
  const bodyGroup = document.getElementById('body-group');
  const scene     = document.getElementById('scene');
  const wrapper   = document.getElementById('flower-wrapper');

  /* ── Parallax shadow/highlight layers ───────────────────
     Factors are in flower-inner local space (×0.6 on screen).
     Shadows drift away from the cursor; highlights toward it. */
  const PARALLAX = [
    { el: document.getElementById('layer-shadow-shadow'),     factor: -0.26  },
    { el: document.getElementById('layer-shadow-colorburn'),  factor: -0.18  },
    { el: document.getElementById('layer-boldaccent'),        factor: -0.14  },
    { el: document.getElementById('layer-highlight-overlay'), factor:  0.20  },
    { el: document.getElementById('layer-highlight-screen'),  factor:  0.28  },
  ];
  const LERP = 0.055;
  let mouseX = 0, mouseY = 0; // target: mouse offset from flower center (screen px)
  let lerpX  = 0, lerpY  = 0; // smoothed current value

  /* ── Flower hover + cursor drift ────────────────────────── */
  let flowerOffX = 0, flowerOffY = 0; // current translate applied to wrapper
  let floatT     = 0;

  document.addEventListener('mousemove', e => {
    const sr = scene.getBoundingClientRect();
    const wr = wrapper.getBoundingClientRect();
    const cx = wr.left - sr.left + wr.width  / 2;
    const cy = wr.top  - sr.top  + wr.height / 2;
    mouseX = e.clientX - sr.left - cx;
    mouseY = e.clientY - sr.top  - cy;
  });

  let mouseLeaveTimer = null;
  document.addEventListener('mouseleave', () => {
    mouseLeaveTimer = setTimeout(() => {
      mouseX = 0;
      mouseY = 0;
    }, 600);
  });
  document.addEventListener('mouseenter', () => {
    clearTimeout(mouseLeaveTimer);
  });

  const ICON_SRC = {
    heart: 'assets/Cozy_Vibe-heart 1 [Vectorized].svg',
    star1: 'assets/Cozy_Vibe-star1 1 [Vectorized].svg',
    star2: 'assets/Cozy_Vibe-star2 1 [Vectorized].svg',
    swirl: 'assets/Cozy_Vibe-swirl 1 [Vectorized].svg',
    crits: 'assets/Cozy_Vibe-crits 1 [Vectorized].svg',
  };

  const MAX_PER_TYPE = 9;
  const particles = [];

  function flowerCenter() {
    const wr = wrapper.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    return {
      x: wr.left - sr.left + wr.width  / 2,
      y: wr.top  - sr.top  + wr.height / 2,
    };
  }

  class Particle {
    constructor(type, spawnAngle) {
      this.type = type;

      this.angle     = spawnAngle ?? Math.random() * Math.PI * 2;
      this.orbitR    = 165 + Math.random() * 90;
      this.speed     = (0.005 + Math.random() * 0.011) * (Math.random() > .5 ? 1 : -1);

      this.wobble    = Math.random() * Math.PI * 2;
      this.wobbleHz  = 0.016 + Math.random() * 0.026;
      this.wobbleAmp = 12  + Math.random() * 22;

      this.drift     = Math.random() * Math.PI * 2;
      this.driftHz   = 0.011 + Math.random() * 0.017;
      this.driftAmp  = 8   + Math.random() * 16;

      this.spin      = Math.random() * 360;
      this.spinRate  = (0.5 + Math.random() * 2.5) * (Math.random() > .5 ? 1 : -1);

      this.scalePhase = Math.random() * Math.PI * 2;
      this.scaleHz    = 0.020 + Math.random() * 0.022;
      this.scaleMid   = 0.78  + Math.random() * 0.28;
      this.scaleAmp   = 0.10  + Math.random() * 0.13;

      this.opacity = 0;
      this.size    = 26 + Math.random() * 20;

      this.el = document.createElement('div');
      this.el.className = 'particle';
      this.el.style.width  = `${this.size}px`;
      this.el.style.height = `${this.size}px`;
      const img = document.createElement('img');
      img.src = ICON_SRC[type];
      img.draggable = false;
      img.setAttribute('aria-hidden', 'true');
      this.el.appendChild(img);
      overlay.appendChild(this.el);
    }

    update(fc) {
      this.angle      += this.speed;
      this.wobble     += this.wobbleHz;
      this.drift      += this.driftHz;
      this.spin       += this.spinRate;
      this.scalePhase += this.scaleHz;

      if (this.opacity < 0.90)
        this.opacity = Math.min(0.90, this.opacity + 0.017);

      const r  = this.orbitR + Math.sin(this.wobble) * this.wobbleAmp;
      const dx = Math.sin(this.drift) * this.driftAmp;
      const x  = fc.x + Math.cos(this.angle) * r + dx * Math.sin(this.angle + Math.PI * 0.5);
      const y  = fc.y + Math.sin(this.angle) * r + dx * Math.cos(this.angle + Math.PI * 0.5);
      const sc = this.scaleMid + Math.sin(this.scalePhase) * this.scaleAmp;

      this.el.style.left      = `${x - this.size * 0.5}px`;
      this.el.style.top       = `${y - this.size * 0.5}px`;
      this.el.style.opacity   = this.opacity;
      this.el.style.transform = `rotate(${this.spin}deg) scale(${sc})`;
    }

    destroy() { this.el.remove(); }
  }

  function spawnParticles(type) {
    const existing = particles.filter(p => p.type === type);

    if (existing.length >= MAX_PER_TYPE) {
      const trim = existing.slice(0, 2);
      trim.forEach(p => {
        particles.splice(particles.indexOf(p), 1);
        p.destroy();
      });
    }

    const count  = 2 + Math.floor(Math.random() * 2);
    const offset = Math.random() * Math.PI * 2;
    for (let i = 0; i < count; i++) {
      const angle = offset + (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
      particles.push(new Particle(type, angle));
    }
  }

  document.querySelectorAll('.spark-btn').forEach(btn => {
    btn.addEventListener('click', () => spawnParticles(btn.dataset.type));
  });

  function loop() {
    // smooth mouse tracking
    lerpX += (mouseX - lerpX) * LERP;
    lerpY += (mouseY - lerpY) * LERP;

    // apply parallax to shadow/highlight layers
    for (const { el, factor } of PARALLAX) {
      el.style.transform = `translate(${lerpX * factor}px, ${lerpY * factor}px)`;
    }

    // ── Flower hover + cursor drift ──────────────────────────
    floatT++;
    // two overlapping sines → organic float (~3.5s + ~5.5s periods)
    const floatY = Math.sin(floatT * 0.030) * 14 + Math.sin(floatT * 0.019) * 5;
    const floatX = Math.sin(floatT * 0.022) *  3  + Math.sin(floatT * 0.013) * 1.5;
    // gentle tilt that follows the vertical arc
    const tilt   = Math.cos(floatT * 0.030) * 1.8 + Math.cos(floatT * 0.019) * 0.6;

    // drift toward cursor — lerpX/lerpY are offset from flower center
    const cursorDist = Math.sqrt(lerpX * lerpX + lerpY * lerpY);
    const driftScale = cursorDist > 0 ? Math.min(cursorDist, 320) / 320 : 0;
    const driftX = cursorDist > 0 ? (lerpX / cursorDist) * 18 * driftScale : 0;
    const driftY = cursorDist > 0 ? (lerpY / cursorDist) * 18 * driftScale : 0;

    flowerOffX += (floatX + driftX - flowerOffX) * 0.038;
    flowerOffY += (floatY + driftY - flowerOffY) * 0.038;
    wrapper.style.transform = `translateY(-50%) translate(${flowerOffX}px, ${flowerOffY}px) rotate(${tilt}deg)`;

    // ── Body 3D tilt — shadows/highlights wrap the form ──────
    const BODY_MAX_TILT = 22;
    const bodyTiltX =  Math.max(-BODY_MAX_TILT, Math.min(BODY_MAX_TILT, lerpX / 280 * BODY_MAX_TILT));
    const bodyTiltY = -Math.max(-BODY_MAX_TILT, Math.min(BODY_MAX_TILT, lerpY / 280 * BODY_MAX_TILT));
    bodyGroup.style.transform = `perspective(380px) rotateY(${bodyTiltX}deg) rotateX(${bodyTiltY}deg)`;

    // ── Face gaze — translates + tilts toward cursor ─────────
    const MAX_TILT  = 38;
    const MAX_SHIFT = 28; // px nudge toward cursor
    const tiltX  =  Math.max(-MAX_TILT,  Math.min(MAX_TILT,  lerpX / 280 * MAX_TILT));
    const tiltY  = -Math.max(-MAX_TILT,  Math.min(MAX_TILT,  lerpY / 280 * MAX_TILT));
    const shiftX =  Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, lerpX / 280 * MAX_SHIFT));
    const shiftY =  Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, lerpY / 280 * MAX_SHIFT));
    // translate first (screen space), then tilt in 3D
    faceEl.style.transform = `translate(${shiftX}px, ${shiftY}px) perspective(320px) rotateY(${tiltX}deg) rotateX(${tiltY}deg)`;

    const fc = flowerCenter();
    for (const p of particles) p.update(fc);
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
