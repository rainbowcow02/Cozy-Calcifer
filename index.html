<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Calcifer</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #1B2461;
      --periwinkle:  #7B8FD6;
      --soft-peri:   #9AA5D8;
      --peach:       #F4A896;
      --pale-yellow: #F5D878;
      --gold-yellow: #F0C040;
      --lav-gray:    #C4C8DC;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background-color: #FAFBFF;
      background-image:
        linear-gradient(rgba(155, 165, 216, 0.28) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155, 165, 216, 0.28) 1px, transparent 1px);
      background-size: 32px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Scene ─────────────────────────────────────────── */
    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* ── Flower ─────────────────────────────────────────── */
    #flower-wrapper {
      position: absolute;
      /* 535×520 at 60% scale → 321×312 */
      left: calc(50% - 240px);
      top: 50%;
      transform: translateY(-50%);
      width: 321px;
      height: 312px;
      isolation: isolate;
    }

    #flower-inner {
      position: relative;
      width: 535px;
      height: 520px;
      transform: scale(0.6);
      transform-origin: top left;
    }

    #flower-inner img {
      position: absolute;
      display: block;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    #controls {
      position: fixed;
      right: 50px;
      top: 0;
      bottom: 0;
      margin-top: auto;
      margin-bottom: auto;
      height: fit-content;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      background: #8897F4;
      border-radius: 36px;
      padding: 12px 10px;
      border: 8px solid rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    .spark-btn {
      position: relative;
      width: 74px;
      height: 74px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: transform 0.13s cubic-bezier(.34,1.56,.64,1);
      outline: none;
    }
    .spark-btn:hover  { transform: scale(1.10) rotate(-3deg); }
    .spark-btn:active { transform: scale(0.93) rotate(2deg); }

    .btn-bg {
      position: absolute;
      inset: 12px 12px 7px 10px;
      border-radius: 5px;
      background: #8897F4;
      transition: background 0.18s ease;
    }
    .spark-btn.active .btn-bg {
      background: #12227B;
    }

    .spark-btn .btn-box {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }
    .spark-btn .btn-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44%;
      height: 44%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    /* ── Chat UI ────────────────────────────────────────── */
    #chat-ui {
      position: absolute;
      left: calc(50% + 100px);
      top: calc(50% - 110px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 30;
    }

    #chat-bubble {
      position: relative;
      background:
        linear-gradient(#fffdef, #fffdef) padding-box,
        linear-gradient(180deg, rgba(195, 177, 235, 0.6) 0%, rgba(34, 58, 230, 0.6) 100%) border-box;
      border: 4px solid transparent;
      border-radius: 12px;
      box-shadow: 0px 5px 14px 0px rgba(177, 184, 235, 0.15);
      padding: 14px 18px 13px;
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--navy);
      width: fit-content;
      opacity: 0;
      transform: scale(0.8);
      transform-origin: left center;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    #chat-bubble.visible {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    /* tail – SVG, left-pointing (desktop) */
    .bubble-tail {
      position: absolute;
      right: calc(100% - 1px);
      top: 0;
      height: 100%;
      width: auto;
      display: block;
      overflow: visible;
      pointer-events: none;
      z-index: -1;
    }

    #bubble-text {
      min-height: 1.45em;
      line-height: 1.45;
    }

    .bubble-cursor {
      display: inline-block;
      animation: cursor-blink 0.65s steps(1) infinite;
      color: var(--periwinkle);
    }

    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    #options-panel {
      background:
        linear-gradient(#fffdef, #fffdef) padding-box,
        linear-gradient(180deg, rgba(195, 177, 235, 0.6) 0%, rgba(34, 58, 230, 0.6) 100%) border-box;
      border: 4px solid transparent;
      border-radius: 12px;
      box-shadow: 0px 5px 14px 0px rgba(177, 184, 235, 0.15);
      padding: 6px 0;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: var(--navy);
      min-width: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #options-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .option-item {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      font-size: 16px;
      white-space: nowrap;
      cursor: pointer;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: background 0.12s ease, opacity 0.22s ease, transform 0.22s ease;
      border-radius: 12px;
      margin: 2px 4px;
    }

    .option-item.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .option-item:hover {
      background: rgba(254, 173, 0, 0.15);
    }

    .opt-arrow {
      color: var(--periwinkle);
      font-size: 32px;
      line-height: 1;
      width: 0;
      overflow: hidden;
      flex-shrink: 0;
      opacity: 0;
      transition: width 0.2s ease, opacity 0.18s ease;
    }

    .option-item:hover .opt-arrow {
      width: 24px;
      opacity: 1;
    }

    /* ── Mobile layout (≤600px) ─────────────────────────── */
    @media (max-width: 600px) {
      #scene {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #flower-wrapper {
        position: relative;
        left: auto;
        top: auto;
        margin-top: 60px;
      }

      #chat-ui {
        left: calc(36% - 10px);
        top: calc(50% - 300px);
        transform: none;
        flex-direction: column-reverse;
        align-items: flex-start;
      }

      /* tail points downward on mobile */
      .bubble-tail {
        right: auto;
        top: calc(100% - 0px);
        left: 2px;
        width: 14px;
        height: auto;
        overflow: visible;
        transform: translate(0, 14px) rotate(-90deg);
        transform-origin: top left;
      }

      #controls {
        position: fixed;
        right: auto;
        top: unset;
        bottom: 30px;
        margin-top: 0;
        margin-bottom: 0;
        height: auto;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        justify-content: center;
        width: 500px;
        min-width: 400px;
        max-width: calc(100% - 32px);
        padding: 10px 12px;
      }
    }

    /* ── Particles ───────────────────────────────────────── */
    #particle-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .particle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
<div id="scene">

  <!-- ── Flower character (11 layers) ──────────────────── -->

    <div id="flower-inner">

      <!-- ── flower petals (bottom group) ── -->

      <img src="assets/Cozy_Vibe-bodyscalop 1 [Vectorized].svg"
           style="left:14.5px;top:0;width:506px;height:520px;opacity:0.29;" alt="">

      <img src="assets/Cozy_Vibe-bodyhighlight 1 [Vectorized].svg"

      <img src="assets/Cozy_Vibe-bodydimension 1 [Vectorized].svg"

        -webkit-mask-size: 100% 100%; mask-size: 100% 100%;
        -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;

        <img id="layer-shadow-colorburn" src="assets/Cozy_Vibe-shadow-colorburn 1 [Vectorized].svg"

        <img id="layer-boldaccent" src="assets/Cozy_Vibe-boldaccent-multiply 1 [Vectorized].svg"
             style="left:58px;top:50px;width:281px;height:246px;mix-blend-mode:multiply;" alt="">

        <img id="layer-highlight-screen" src="assets/Cozy_Vibe-highlight-screen 1 [Vectorized].svg"
             style="left:158px;top:22px;width:167px;height:121px;mix-blend-mode:screen;opacity:0.9;" alt="">
      </div>

      <!-- ── face (top) — split into 3 slices for blink warp ── -->
      <!-- face-group receives the gaze transform; all slices move together -->
      <div id="face-group" style="position:absolute;left:130px;top:169px;width:275px;height:182px;">

        <!-- slice A: forehead / above eyes (y 0–35 of face SVG, never distorts) -->
        <img src="assets/Cozy_Vibe-face 1 [Vectorized].svg"
             style="left:0;top:0;width:275px;height:182px;
                    clip-path:inset(0 0 147px 0);" alt="">

        <!-- slice B: eye band (y 35–115). scaleY → 0 squishes eyes to thin slits,
             revealing the golden body behind — no overlay color needed -->
        <div id="eye-slice"
             style="position:absolute;left:0;top:35px;width:275px;height:80px;
                    overflow:hidden;transform-origin:50% 50%;">
          <img src="assets/Cozy_Vibe-face 1 [Vectorized].svg"
               style="left:0;top:-35px;width:275px;height:182px;" alt="">
        </div>

        <!-- slice C: mouth + chin (y 115–182, never distorts) -->
        <img id="flower-face" src="assets/Cozy_Vibe-face 1 [Vectorized].svg"
             style="left:0;top:0;width:275px;height:182px;
                    clip-path:inset(115px 0 0 0);" alt="">
      </div>

    </div>
  </div>

  <!-- ── Chat UI ───────────────────────────────────────── -->
  <div id="chat-ui">
    <div id="chat-bubble">
      <svg class="bubble-tail" viewBox="0 0 28 119" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="none">

          <linearGradient id="tail-stroke-grad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="119">
            <stop offset="0%" stop-color="rgba(195,177,235,0.6)"/>
            <stop offset="100%" stop-color="rgba(34,58,230,0.6)"/>
          </linearGradient>
          <!-- clips only the right side so endpoint stubs stay hidden behind the bubble,
               while the left tip is free to bleed outside the viewBox -->
          <clipPath id="tail-right-clip">
            <rect x="-20" y="-10" width="48" height="139"/>
          </clipPath>
        </defs>
        <!-- cream fill: right edge at x=35 so it covers the bubble's 4px left border -->
        <path
          d="M35 118.4C35 114.086 27.4992 109.774 27.4601 105.46C27.422 101.331 27.3681 96.7094 26.0962 92.6913C24.7218 88.3509 22.3186 85.4774 19.4904 82.5862C17.4562 80.5048 13.1161 76.4162 11.0206 74.4254C9.30255 72.796 5.90661 69.6064 4.26361 67.8649C2.19665 65.6727 -0.000355126 62.9629 -0.000354633 59.1991C-0.000354139 55.4354 2.19665 52.7268 4.2615 50.5358C5.90344 48.7944 9.3015 45.6048 11.0185 43.9742C13.114 41.9859 17.4541 37.8973 19.4883 35.8145C22.3165 32.9184 24.7197 30.0499 26.0941 25.7107C27.3628 21.6914 27.4199 17.0688 27.458 12.9424C27.4971 8.62717 35 4.31441 35 0Z"
          fill="#fffdef"
          stroke="none"
        />
        <!-- gradient stroke: open path (no Z) — right edge has no stroke, endpoints tucked behind bubble at x=35 -->
        <path
          d="M35 118.4C35 114.086 27.4992 109.774 27.4601 105.46C27.422 101.331 27.3681 96.7094 26.0962 92.6913C24.7218 88.3509 22.3186 85.4774 19.4904 82.5862C17.4562 80.5048 13.1161 76.4162 11.0206 74.4254C9.30255 72.796 5.90661 69.6064 4.26361 67.8649C2.19665 65.6727 -0.000355126 62.9629 -0.000354633 59.1991C-0.000354139 55.4354 2.19665 52.7268 4.2615 50.5358C5.90344 48.7944 9.3015 45.6048 11.0185 43.9742C13.114 41.9859 17.4541 37.8973 19.4883 35.8145C22.3165 32.9184 24.7197 30.0499 26.0941 25.7107C27.3628 21.6914 27.4199 17.0688 27.458 12.9424C27.4971 8.62717 35 4.31441 35 0"

    <div id="options-panel">

  <!-- ── Buttons ────────────────────────────────────────── -->
  <div id="controls">

    <button class="spark-btn" data-type="heart">
      <div class="btn-bg"></div>
      <img class="btn-box"  src="assets/Cozy_Vibe-box 1 [Vectorized].svg"   alt="">

<script>
  const overlay   = document.getElementById('particle-overlay');
  const faceEl    = document.getElementById('flower-face');
  const faceGroup = document.getElementById('face-group');
  const bodyGroup = document.getElementById('body-group');
  const scene     = document.getElementById('scene');
  const wrapper   = document.getElementById('flower-wrapper');
  const eyeSlice  = document.getElementById('eye-slice');

  /* ── Parallax shadow/highlight layers ───────────────────
     Factors are in flower-inner local space (×0.6 on screen).
     Shadows drift away from the cursor; highlights toward it. */
  const PARALLAX = [
    { el: document.getElementById('layer-shadow-shadow'),     factor: -0.26  },
    { el: document.getElementById('layer-shadow-colorburn'),  factor: -0.18  },
    { el: document.getElementById('layer-boldaccent'),        factor: -0.14  },
    { el: document.getElementById('layer-highlight-overlay'), factor:  0.20  },
    { el: document.getElementById('layer-highlight-screen'),  factor:  0.28  },
  ];
  const LERP = 0.055;
  let mouseX = 0, mouseY = 0; // target: mouse offset from flower center (screen px)
  let lerpX  = 0, lerpY  = 0; // smoothed current value

  /* ── Blink state machine ─────────────────────────────────
     Phases: 'idle' → 'closing' → 'closed' → 'opening'
     For a double-blink, after 'opening' there's a short 'gap'
     before looping back to 'closing' once more.              */
  const BK_CLOSE = 4;   // frames to close (~67 ms @ 60fps)
  const BK_PAUSE = 2;   // frames held shut
  const BK_OPEN  = 6;   // frames to reopen
  const BK_GAP   = 8;   // frames between double-blink strokes
  let blinkPhase  = 'idle';
  let blinkFStart = 0;          // floatT at start of current phase
  let nextBlink   = 200 + Math.random() * 120;  // frames until first blink
  let extraBlink  = 0;          // 1 = one more blink pending (double)

  // s: 0 = eyes open, 1 = eyes fully closed
  // eye-slice scaleY is the inverse: 1 = open, 0 = closed (eyes squish away)
  function setLidScale(s) {
    eyeSlice.style.transform = `scaleY(${(1 - s).toFixed(4)})`;
  }

  /* ── Reaction bounce ────────────────────────────────────────
     Triggered on every spark-btn click.
     Phase 1 (5 frames / 0.08s): squish + sink  60px down
     Phase 2 (9 frames / 0.15s): stretch + shoot 100px up
     Phase 3 (6 frames / 0.10s): fall back, overshoot +8px
     Phase 4 (4 frames / 0.07s): spring back to rest        */
  // right/left phases
  const B1 = 5, B2 = 9, B3 = 6, B4 = 4;
  const BOUNCE_TOTAL = B1 + B2 + B3 + B4;
  // axel phases — slow wind-up → visible spin → land cleanly
  const A1 = 12, A2 = 16, A3 = 8, A4 = 5;
  const BOUNCE_TOTAL_AXEL = A1 + A2 + A3 + A4;

  let bounceT = 0;
  // Cycles: lean-right → lean-left → axel → axel-reverse → repeat
  const BOUNCE_STYLES = ['right', 'left', 'axel', 'axel-reverse'];
  let bounceStyleIdx = 0;
  let bounceStyle    = 'right';

  function triggerBounce() {
    bounceStyle    = BOUNCE_STYLES[bounceStyleIdx % 4];
    bounceStyleIdx++;
    bounceT = (bounceStyle === 'axel' || bounceStyle === 'axel-reverse') ? BOUNCE_TOTAL_AXEL : BOUNCE_TOTAL;
  }

  function getBounceScale() {
    if (bounceT <= 0) return { sx: 1, sy: 1, dy: 0, rot: 0 };
    const isAxel    = bounceStyle === 'axel' || bounceStyle === 'axel-reverse';
    const axelDir   = bounceStyle === 'axel-reverse' ? -1 : 1;
    const total     = isAxel ? BOUNCE_TOTAL_AXEL : BOUNCE_TOTAL;
    const elapsed   = total - bounceT;
    bounceT--;
    const ein  = t => 1 - Math.cos(t * Math.PI * 0.5); // slow start → fast end
    const eout = t => Math.sin(t * Math.PI * 0.5);      // fast start → slow end
    const eio  = t => (1 - Math.cos(t * Math.PI)) * 0.5; // slow → fast → slow
    const dir  = bounceStyle === 'left' ? -1 : 1;
    const p1 = isAxel ? A1 : B1;
    const p2 = isAxel ? A2 : B2;
    const p3 = isAxel ? A3 : B3;
    const p4 = isAxel ? A4 : B4;
    if (elapsed < p1) {
      // Phase 1: wind-up (axel: slow dramatic load; right/left: lean back)
      const e = ein(elapsed / p1);
      return { sx: 1 + e * 0.15, sy: 1 - e * 0.20, dy: e * 60,
               rot: isAxel ? axelDir * e * 10 : dir * e * 2.5 };
    } else if (elapsed < p1 + p2) {
      // Phase 2: launch (axel: snappy full spin; right/left: tip forward)
      const e = eout((elapsed - p1) / p2);
      return { sx: 1.15 - e * 0.30, sy: 0.80 + e * 0.42, dy: 60 - e * 160,
               rot: isAxel ? axelDir * (10 + e * 355) : dir * (2.5 - e * 5.5) };
    } else if (elapsed < p1 + p2 + p3) {
      // Phase 3: fall + overshoot (axel: glide to clean 360; right/left: swing back)
      const e = eout((elapsed - p1 - p2) / p3);
      return { sx: 0.85 + e * 0.20, sy: 1.22 - e * 0.27, dy: -100 + e * 108,
               rot: isAxel ? axelDir * (365 - e * 5) : dir * (-3 + e * 4) };
    } else {
      // Phase 4: spring to rest (axel lands at 360° ≡ 0°, no snap)
      const e = eio((elapsed - p1 - p2 - p3) / p4);
      return { sx: 1.05 - e * 0.05, sy: 0.95 + e * 0.05, dy: 8 - e * 8,
               rot: isAxel ? axelDir * 360 : dir * (1 - e) };
    }
  }

  /* ── Flower hover + cursor drift ────────────────────────── */
  let flowerOffX = 0, flowerOffY = 0; // current translate applied to wrapper
  let floatT     = 0;
  let faceOffY   = 0; // secondary motion: face lags behind the bounce

  document.addEventListener('mousemove', e => {
    const sr = scene.getBoundingClientRect();
    const wr = wrapper.getBoundingClientRect();
    const cx = wr.left - sr.left + wr.width  / 2;
    const cy = wr.top  - sr.top  + wr.height / 2;
    mouseX = e.clientX - sr.left - cx;
    mouseY = e.clientY - sr.top  - cy;
  });

  /* ── Responsive mode cache ───────────────────────────────
     Checked once on load and on resize — not every RAF tick.
     Resetting lerp values on mode-switch prevents the flower
     from jumping due to stale accumulated offsets.           */
  let isMobile = window.innerWidth <= 600;
  window.addEventListener('resize', () => {
    const wasMobile = isMobile;
    isMobile = window.innerWidth <= 600;
    if (wasMobile !== isMobile) {
      flowerOffX = 0;
      flowerOffY = 0;
      lerpX = 0;
      lerpY = 0;
    }
  });

  let mouseLeaveTimer = null;
  document.addEventListener('mouseleave', () => {
    mouseLeaveTimer = setTimeout(() => {
      mouseX = 0;
      mouseY = 0;
    }, 600);
  });
  document.addEventListener('mouseenter', () => {
    clearTimeout(mouseLeaveTimer);
  });

  const ICON_SRC = {
    heart: 'assets/Cozy_Vibe-heart 1 [Vectorized].svg',
    star1: 'assets/Cozy_Vibe-star1 1 [Vectorized].svg',
    star2: 'assets/Cozy_Vibe-star2 1 [Vectorized].svg',
    swirl: 'assets/Cozy_Vibe-swirl 1 [Vectorized].svg',
    crits: 'assets/Cozy_Vibe-crits 1 [Vectorized].svg',
  };

  // All particle SVGs share the same base pale-yellow fill (#FEE69A, S=98%).
  // hue-rotate shifts the hue; brightness adjusts for palette colors darker than the base.
  // Saturation is kept at full to avoid dullness.
  const PARTICLE_FILTER = {
    heart: 'hue-rotate(323deg)',                  // → vivid peach/coral
    star1: 'brightness(0.94)',                     // → bright pale yellow
    star2: 'brightness(0.82)',                     // → rich gold
    swirl: 'hue-rotate(178deg) brightness(0.88)', // → vivid periwinkle
  };

  // Crits: each of the 4 shapes gets a random palette color (confetti).
  const CONFETTI_COLORS = ['#7B8FD6', '#F4A896', '#F5D878', '#F0C040', '#C4C8DC', '#9AA5D8'];
  const CRITS_PATHS = [
    // box
    'M120.889 99.57C125.055 98.9733 130.075 100.306 134.17 101.085C141.942 102.597 149.682 104.264 157.387 106.086C162.246 107.191 167.214 107.861 171.944 109.445C179.836 112.088 177.135 118.686 175.38 124.332L172.027 135.077L166.055 154.185C164.891 157.932 163.828 161.971 162.463 165.626C162.373 165.869 162.271 166.107 162.156 166.339C160.225 170.239 157.558 169.87 153.785 169.078C150.727 168.435 147.683 167.214 144.66 166.372L125.227 160.761C120.725 159.42 114.03 157.973 110.602 154.757C109.46 153.685 109.432 148.719 109.623 147.116C109.913 144.67 110.531 142.338 110.958 139.904C113.005 128.235 115.561 116.635 117.69 104.972C118.005 103.244 119.043 100.084 120.889 99.57ZM125.973 146.222C129.978 147.836 135.369 148.755 139.572 150.194C140.882 150.642 148.166 152.914 148.968 152.958C149.506 152.411 149.893 150.792 150.154 149.955C152.497 140.952 155.844 131.75 158.53 122.817C158.762 122.046 159.032 121.253 159.368 120.521C155.127 120.036 152.104 119.228 147.964 118.34C142.924 117.259 137.107 116.334 132.147 115.14C131.326 117.212 131.341 121.015 130.807 123.322C129.066 130.838 128.019 138.8 125.973 146.222Z',
    // X
    'M45.238 124.907C46.4375 124.999 47.5206 125.387 48.7022 125.585C49.6116 125.738 50.4228 124.874 51.2193 125.518C53.3186 127.215 54.0565 129.984 55.4079 132.222C57.3397 135.421 59.3197 137.713 60.1241 141.443C60.6872 140.782 61.3355 140.144 62.0664 139.666C65.8102 137.104 68.8289 134.101 72.6678 131.662C76.2638 129.378 77.5008 131.365 80.3501 129.916C82.2003 130.098 87.6784 131.251 87.6968 133.617C87.0003 134.631 86.797 133.574 85.7037 134.613C85.419 135.788 87.0085 136.452 87.4908 137.571C89.8507 143.376 82.1581 144.608 79.1403 146.638C75.2199 149.274 72.1317 151.393 67.9664 153.65C68.1685 154.149 68.4123 154.758 68.7401 155.178C70.7924 157.808 72.3808 160.692 73.9826 163.606C75.1597 165.748 76.3872 167.885 77.4947 170.068C78.3848 171.823 78.9323 173.618 79.8765 175.348L79.7536 175.726C79.2517 176.498 79.0761 176.79 78.7244 177.634C78.9556 178.473 79.5882 177.885 79.9913 178.789C79.4396 179.676 77.5631 181.316 76.6513 181.692C66.2154 185.994 64.5668 174.708 61.1195 168.1C59.67 165.322 58.1428 163.216 56.8445 160.672C49.4003 164.843 43.982 172.828 35.8857 166.348C32.9884 164.029 34.5824 162.777 33.9309 159.482C35.9467 156.183 39.3697 153.892 42.8462 152.314C46.0197 152.623 44.6286 152.071 46.3825 149.998C46.5373 149.815 49.2357 148.382 49.892 147.876C48.9633 146.396 48.1632 144.343 47.3379 142.771C45.1278 138.563 40.1285 128.788 45.238 124.907Z',
    // circle
    'M59.5274 54.2341C70.0955 52.9015 81.1611 61.3719 83.9061 71.2475C85.7438 77.8585 81.8823 86.0497 76.9814 90.3971C73.1436 93.8016 72.4625 94.7088 67.266 95.7285C59.5441 97.2746 44.2861 91.1486 42.8671 82.5361C41.7512 75.7628 43.695 67.2184 47.2164 61.3598C49.8202 57.0276 54.8299 55.1546 59.5274 54.2341Z',
    // dash
    'M167.383 28.4719C170.338 28.8148 174.246 30.3983 176.586 32.301C177.126 32.7395 177.582 33.8016 178.896 34.8804L178.304 36.0533C178.413 37.0593 178.672 36.6834 179.034 37.4465C180.242 39.2016 177.367 41.0728 177.272 41.8973C177.028 44.0272 177.292 44.3411 174.917 45.8419C169.451 49.2968 163.642 52.473 157.939 55.559C153.037 58.2111 148.257 61.3087 143.384 64.0395C139.526 66.2116 134.954 68.4609 131.265 70.8545C130.52 71.2718 129.353 71.7656 128.551 72.1348C121.89 68.6479 115.651 64.8297 122.087 56.5549C124.278 53.7387 129.419 51.3704 132.531 49.3982L153.39 36.4108C157.413 33.8634 162.622 28.998 167.383 28.4719Z',
  ];

  function makeCritsSvg() {
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 213 194');
    svg.setAttribute('fill', 'none');
    svg.style.cssText = 'width:100%;height:100%;';
    CRITS_PATHS.forEach(d => {
      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)]);
      svg.appendChild(path);
    });
    return svg;
  }

  const MAX_PER_TYPE = 9;
  const particles = [];

  function flowerCenter() {
    const wr = wrapper.getBoundingClientRect();
    const sr = scene.getBoundingClientRect();
    return {
      x: wr.left - sr.left + wr.width  / 2,
      y: wr.top  - sr.top  + wr.height / 2,
    };
  }

  class Particle {
    constructor(type, spawnAngle) {
      this.type = type;

      this.angle     = spawnAngle ?? Math.random() * Math.PI * 2;
      this.orbitR    = 165 + Math.random() * 90;
      this.speed     = (0.005 + Math.random() * 0.011) * (Math.random() > .5 ? 1 : -1);

      this.wobble    = Math.random() * Math.PI * 2;
      this.wobbleHz  = 0.016 + Math.random() * 0.026;
      this.wobbleAmp = 12  + Math.random() * 22;

      this.drift     = Math.random() * Math.PI * 2;
      this.driftHz   = 0.011 + Math.random() * 0.017;
      this.driftAmp  = 8   + Math.random() * 16;

      this.spin      = Math.random() * 360;
      this.spinRate  = (0.5 + Math.random() * 2.5) * (Math.random() > .5 ? 1 : -1);

      this.scalePhase = Math.random() * Math.PI * 2;
      this.scaleHz    = 0.020 + Math.random() * 0.022;
      this.scaleMid   = 0.78  + Math.random() * 0.28;
      this.scaleAmp   = 0.10  + Math.random() * 0.13;

      this.opacity = 0;
      this.size    = 26 + Math.random() * 20;

      this.el = document.createElement('div');
      this.el.className = 'particle';
      this.el.style.width  = `${this.size}px`;
      this.el.style.height = `${this.size}px`;

      if (type === 'crits') {
        this.el.appendChild(makeCritsSvg());
      } else {
        const img = document.createElement('img');
        img.src = ICON_SRC[type];
        img.style.filter = PARTICLE_FILTER[type];
        img.draggable = false;
        img.setAttribute('aria-hidden', 'true');
        this.el.appendChild(img);
      }

      overlay.appendChild(this.el);
    }

    update(fc) {
      this.angle      += this.speed;
      this.wobble     += this.wobbleHz;
      this.drift      += this.driftHz;
      this.spin       += this.spinRate;
      this.scalePhase += this.scaleHz;

      if (this.dying) {
        this.opacity = Math.max(0, this.opacity - 0.04);
        if (this.opacity <= 0) return 'remove';
      } else if (this.opacity < 0.90) {
        this.opacity = Math.min(0.90, this.opacity + 0.017);
      }

      const r  = this.orbitR + Math.sin(this.wobble) * this.wobbleAmp;
      const dx = Math.sin(this.drift) * this.driftAmp;
      const x  = fc.x + Math.cos(this.angle) * r + dx * Math.sin(this.angle + Math.PI * 0.5);
      const y  = fc.y + Math.sin(this.angle) * r + dx * Math.cos(this.angle + Math.PI * 0.5);
      const sc = this.scaleMid + Math.sin(this.scalePhase) * this.scaleAmp;

      this.el.style.left      = `${x - this.size * 0.5}px`;
      this.el.style.top       = `${y - this.size * 0.5}px`;
      this.el.style.opacity   = this.opacity;
      this.el.style.transform = `rotate(${this.spin}deg) scale(${sc})`;
    }

    destroy() { this.el.remove(); }
  }

  function spawnParticles(type) {
    const existing = particles.filter(p => p.type === type && !p.dying);

    if (existing.length >= MAX_PER_TYPE) {
      const trim = existing.slice(0, 2);
      trim.forEach(p => { p.dying = true; });
    }

    const count  = 2 + Math.floor(Math.random() * 2);
    const offset = Math.random() * Math.PI * 2;
    for (let i = 0; i < count; i++) {
      const angle = offset + (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
      particles.push(new Particle(type, angle));
    }
  }

  function killParticles(type) {
    particles.filter(p => p.type === type).forEach(p => { p.dying = true; });
  }

  document.querySelectorAll('.spark-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const isActive = btn.classList.toggle('active');
      triggerBounce();
      if (isActive) {
        spawnParticles(btn.dataset.type);
      } else {
        killParticles(btn.dataset.type);
      }
    });
  });

  function loop() {
    // smooth mouse tracking
    lerpX += (mouseX - lerpX) * LERP;
    lerpY += (mouseY - lerpY) * LERP;

    // apply parallax to shadow/highlight layers
    for (const { el, factor } of PARALLAX) {
      el.style.transform = `translate(${lerpX * factor}px, ${lerpY * factor}px)`;
    }

    // ── Flower hover + cursor drift ──────────────────────────
    floatT++;
    // two overlapping sines → organic float (~3.5s + ~5.5s periods)
    const floatY = Math.sin(floatT * 0.030) * 14 + Math.sin(floatT * 0.019) * 5;
    const floatX = Math.sin(floatT * 0.022) *  3  + Math.sin(floatT * 0.013) * 1.5;
    // gentle tilt that follows the vertical arc
    const tilt   = Math.cos(floatT * 0.030) * 1.8 + Math.cos(floatT * 0.019) * 0.6;

    // drift toward cursor — lerpX/lerpY are offset from flower center
    const cursorDist = Math.sqrt(lerpX * lerpX + lerpY * lerpY);
    const driftScale = cursorDist > 0 ? Math.min(cursorDist, 320) / 320 : 0;
    const driftX = cursorDist > 0 ? (lerpX / cursorDist) * 18 * driftScale : 0;
    const driftY = cursorDist > 0 ? (lerpY / cursorDist) * 18 * driftScale : 0;

    flowerOffX += (floatX + driftX - flowerOffX) * 0.038;
    flowerOffY += (floatY + driftY - flowerOffY) * 0.038;
    const bounce = getBounceScale();
    faceOffY += (bounce.dy - faceOffY) * 0.2; // lerp face toward body position
    const faceLagY = faceOffY - bounce.dy;     // residual: face is still "behind" body
    const vertCenter = isMobile ? '' : 'translateY(-50%) ';
    wrapper.style.transform = `${vertCenter}translate(${flowerOffX}px, ${flowerOffY + bounce.dy}px) rotate(${tilt + bounce.rot}deg) scale(${bounce.sx.toFixed(4)}, ${bounce.sy.toFixed(4)})`;

    // ── Body 3D tilt — shadows/highlights wrap the form ──────
    const BODY_MAX_TILT = 22;
    const bodyTiltX =  Math.max(-BODY_MAX_TILT, Math.min(BODY_MAX_TILT, lerpX / 280 * BODY_MAX_TILT));
    const bodyTiltY = -Math.max(-BODY_MAX_TILT, Math.min(BODY_MAX_TILT, lerpY / 280 * BODY_MAX_TILT));
    bodyGroup.style.transform = `perspective(380px) rotateY(${bodyTiltX}deg) rotateX(${bodyTiltY}deg)`;

    // ── Face gaze — translates + tilts toward cursor ─────────
    const MAX_TILT  = 38;
    const MAX_SHIFT = 28; // px nudge toward cursor
    const tiltX  =  Math.max(-MAX_TILT,  Math.min(MAX_TILT,  lerpX / 280 * MAX_TILT));
    const tiltY  = -Math.max(-MAX_TILT,  Math.min(MAX_TILT,  lerpY / 280 * MAX_TILT));
    const shiftX =  Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, lerpX / 280 * MAX_SHIFT));
    const shiftY =  Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, lerpY / 280 * MAX_SHIFT));
    // translate first (screen space), then tilt in 3D
    // applied to face-group so eyelids inherit the same transform
    faceGroup.style.transform = `translate(${shiftX}px, ${shiftY + faceLagY}px) perspective(320px) rotateY(${tiltX}deg) rotateX(${tiltY}deg)`;

    // ── Blink ─────────────────────────────────────────────────
    const bf = floatT - blinkFStart;
    if (blinkPhase === 'idle') {
      if (floatT >= nextBlink) {
        blinkPhase  = 'closing';
        blinkFStart = floatT;
        extraBlink  = Math.random() < 0.2 ? 1 : 0;
      }
    } else if (blinkPhase === 'closing') {
      setLidScale(Math.min(1, bf / BK_CLOSE));
      if (bf >= BK_CLOSE) { blinkPhase = 'closed'; blinkFStart = floatT; }
    } else if (blinkPhase === 'closed') {
      if (bf >= BK_PAUSE) { blinkPhase = 'opening'; blinkFStart = floatT; }
    } else if (blinkPhase === 'opening') {
      setLidScale(1 - Math.min(1, bf / BK_OPEN));
      if (bf >= BK_OPEN) {
        setLidScale(0);
        if (extraBlink > 0) {
          extraBlink--;
          blinkPhase  = 'gap';
          blinkFStart = floatT;
        } else {
          blinkPhase = 'idle';
          nextBlink  = floatT + 180 + Math.random() * 120; // 3–5 s
        }
      }
    } else if (blinkPhase === 'gap') {
      if (bf >= BK_GAP) { blinkPhase = 'closing'; blinkFStart = floatT; }
    }

    const fc = flowerCenter();
    fc.y -= bounce.dy; // counteract bounce so particles orbit the stable center
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].update(fc) === 'remove') {
        particles[i].destroy();
        particles.splice(i, 1);
      }
    }
    requestAnimationFrame(loop);
  }
  loop();

  /* ── Chat UI ─────────────────────────────────────────── */
  const chatBubble   = document.getElementById('chat-bubble');
  const bubbleText   = document.getElementById('bubble-text');
  const chatUI       = document.getElementById('chat-ui');
  const optionsPanel = document.getElementById('options-panel');
  const optionItems  = document.querySelectorAll('.option-item');

  let chatOpen       = false;
  let typewriterRaf  = null;
  let optionTimeouts = [];

  const CHAT_MSG = "what's up? 🌸";

  function openChat() {
    chatOpen = true;
    chatBubble.classList.add('visible');
    bubbleText.innerHTML = '';

    const chars  = [...CHAT_MSG];
    let   i      = 0;
    const cursor = document.createElement('span');
    cursor.className  = 'bubble-cursor';
    cursor.textContent = '|';
    bubbleText.appendChild(cursor);

    const CHAR_MS = 40;
    let last = 0;
    function typeFrame(ts) {
      if (ts - last >= CHAR_MS) {
        last = ts;
        if (i < chars.length) {
          cursor.insertAdjacentText('beforebegin', chars[i++]);
        } else {
          cursor.remove();
          optionsPanel.classList.add('visible');
          optionItems.forEach((item, idx) => {
            const t = setTimeout(() => item.classList.add('visible'), idx * 130);
            optionTimeouts.push(t);
          });
          return;
        }
      }
      typewriterRaf = requestAnimationFrame(typeFrame);
    }
    typewriterRaf = requestAnimationFrame(typeFrame);
  }

  function closeChat() {
    chatOpen = false;
    cancelAnimationFrame(typewriterRaf);
    optionTimeouts.forEach(clearTimeout);
    optionTimeouts = [];
    chatBubble.classList.remove('visible');
    optionsPanel.classList.remove('visible');
    optionItems.forEach(item => item.classList.remove('visible'));
    setTimeout(() => { bubbleText.innerHTML = ''; }, 250);
  }

  wrapper.style.cursor = 'pointer';
  wrapper.addEventListener('click', e => {
    e.stopPropagation();
    if (chatOpen) {
      closeChat();
    } else {
      triggerBounce();
      openChat();
    }
  });

  chatUI.addEventListener('click', e => e.stopPropagation());
  document.addEventListener('click', () => { if (chatOpen) closeChat(); });

  optionItems.forEach(item => {
    item.addEventListener('click', () => {
      // TODO: trigger character state for item.dataset.option
      closeChat();
    });
  });
</script>
